<!DOCTYPE html>
<html lang="it" dir="ltr">
<head>
<script>document.documentElement.style.backgroundColor = "#000f16";</script>  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Your O.S.</title>

  <link rel="preload" href="https://gitechnolo.github.io/biotechproject/Biotech-file/BiotechResilience.js" as="script">  

  <style type="text/css">
    /* 1. Gestione Visibilità: Visibile di default (SEO/No-JS), nascosto solo se JS è attivo e il browser è moderno */
    #main-content { opacity: 1; }
    @supports (selector(html:has(body))) { 
      #main-content { opacity: 0; transition: opacity 0.3s ease; }
    }    

    /* 2. Stili Strutturali Critici (Inline per velocità) */
    body { 
      margin: 0; padding: 20px; background-color: #000; color: rgb(212, 211, 211); 
      font-family: 'Sansation', sans-serif; overflow: hidden; width: 100vw; height: 100vh; 
      display: flex; flex-direction: column; align-items: flex-start; justify-content: flex-start; 
      text-align: left; font-size: 16px; position: relative;
    }
    #closeBtn { 
      position: absolute; top: 10px; right: 10px; font-size: 30px; font-weight: bold; 
      background: none; border: none; color: rgb(212, 211, 211); cursor: pointer; 
      z-index: 10; padding: 0; line-height: 1; transition: color 0.2s;
    }
    #closeBtn:hover, #closeBtn:focus { color: #0f0; outline: 2px solid #0f0; outline-offset: 2px; }
    .biotechbold { font-size: 28px; letter-spacing: 2px; text-shadow: 0 0 10px #0f0; margin-bottom: 10px; }
    #likeBtn { font-size: 20px; background: none; border: none; cursor: pointer; color: #0f0; margin-bottom: 15px; transition: transform 0.2s; }
    #likeBtn:hover { color: #f00; transform: scale(1.2); }
    #likeBtn:disabled { color: #666; cursor: not-allowed; }
    #risolution, #typeInfo { max-width: 90%; font-size: 14px; line-height: 1.5; margin: 8px 0; opacity: 0.9; word-wrap: break-word; }
    .header-row { display: flex; flex-direction: row; align-items: center; gap: 10px; margin-bottom: 15px; flex-wrap: nowrap; white-space: nowrap; }
  </style>   

  <link rel="stylesheet" href="https://gitechnolo.github.io/biotechproject/Biotech-file/biotech.min.css" media="print" onload="this.media='all'; this.onload=null;">
  <noscript><link rel="stylesheet" href="https://gitechnolo.github.io/biotechproject/Biotech-file/biotech.min.css"></noscript>

  <script src="https://gitechnolo.github.io/biotechproject/Biotech-file/BiotechResilience.js" defer></script>
  <script>;!function(e,t){const d=document,f=()=>(n=d.getElementById(e))&&(n.style.opacity="1");var n,c,o;f()||(o=new MutationObserver(((e,t)=>{f()&&(t.disconnect(),clearTimeout(c))})).observe(d.documentElement,{childList:!0,subtree:!0}),c=setTimeout((()=>{f(),o&&o.disconnect()}),t))}("main-content",80);</script>  
</head>

<body class="biotechbody">
  <div id="main-content">
    <button id="closeBtn" onclick="window.close()" aria-label="Chiudi finestra" title="Chiudi (tasto Enter)">
      &times;
    </button>
    
    <div class="header-row">
      <span class="biotechbold">Your O.S.</span>
      <button id="likeBtn" class="text">❤️ Mi Piace</button>
    </div>

    <p id="risolution" class="text"></p>
    <p id="typeInfo" class="text"></p>

    <script src="https://unpkg.com/typeit@8.7.1/dist/index.umd.js"></script>
    
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        // --- Gestione Pulsante Like ---
        const likeBtn = document.getElementById("likeBtn");
        if (likeBtn) {
          likeBtn.addEventListener("click", function () {
            this.innerHTML = "❤️ Piaciuto!";
            this.disabled = true;
          });
        }

        // --- Info Sistema ---
        const risolution = document.getElementById("risolution");
        if (risolution) {
          risolution.innerHTML = `
            Your screen resolution is ${window.screen.width}x${window.screen.height} pixels.<br>
            Browser window size ${window.innerWidth}x${window.innerHeight} pixels.<br>
            ${navigator.appName} version ${navigator.appVersion}.<br>
            Language: ${navigator.language}. &nbsp; 
            Status: ${navigator.onLine ? "Online" : "Offline"}. &nbsp; 
            Cookies enabled: ${navigator.cookieEnabled ? "Yes" : "No"}. &nbsp; 
            Vendor: ${navigator.vendor}. &nbsp; 
            <b>Do Not Track</b>: ${navigator.doNotTrack || "Not supported"}.
          `;
        }

        // --- Animazione TypeIt ---
        if (typeof TypeIt !== "undefined") {
          new TypeIt("#typeInfo", {
            strings: [
              "<span class='Sansation'>Cosa significa Do Not Track?</span> &nbsp; <span class='text'>ChatGPT (֍)</span>",
              "<span class='text'><b>Do Not Track (DNT)</b> è un header HTTP che permette agli utenti di comunicare al server web la loro preferenza riguardo alla raccolta dei dati di navigazione.<br> Quando l'utente attiva la funzione Do Not Track, il browser invia un valore specifico <em>(1)</em> al server, indicando che non desidera essere tracciato.</span>"
            ],
            speed: 50,
            waitUntilVisible: true,
            startDelay: 300,
            afterStep: () => {
              document.getElementById("typeInfo").style.opacity = "1";
            }
          }).go();
        }
      });
    </script>
  </div>
</body>
</html>
