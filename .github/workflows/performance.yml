# SRE RELIABILITY GATE: Stateless Edge Architecture
# -------------------------------------------------------------------------
# GOAL: Monitor SLIs (TTI < 1.1s) to ensure Global Health Equity.
# PROTOCOL: Performance < 95 OR Security Breach = System Outage.
# TARGET: 100% Availability on Legacy Hardware & Degraded Networks (3G/Edge).
# -------------------------------------------------------------------------

name: Performance, SRE Audit & Auto-Minify

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  generate-report-and-deploy:
    name: Audit & Production Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      issues: write

    steps:
      - name: 🔁 Checkout BiotechProject
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- 1. SICUREZZA ---
      - name: 🛡️ Nightly Security Scan
        id: security-scan
        run: |
          echo "Analisi proattiva riga per riga..."
          ! grep -rE "password:|api_key:|secret:|token:" . \
            --exclude=performance.yml \
            --exclude-dir=.git \
            || (echo "❌ Rilevato dato sensibile!" && exit 1)

      # --- 2. ANALISI PERFORMANCE (SRE) ---
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📂 Restore previous report
        run: |
          mkdir -p tools
          if [ -f data/performance-latest.json ]; then
            cp data/performance-latest.json tools/performance-latest.json
          fi

      - name: 📦 Install dependencies
        run: |
          cd tools && npm install

      - name: 🚀 Run Performance Analysis
        id: performance
        continue-on-error: true
        run: |
          cd tools
          node generate-performance.js
          mkdir -p ../data
          cp performance-data.json ../data/performance-latest.json

      # --- 3. MINIFICAZIONE (src -> root) ---
      - name: ✨ Minify HTML Aggressivo
        run: |
          npm install -g html-minifier
          for file in src/*.html; do
            filename=$(basename "$file")
            html-minifier --collapse-whitespace --remove-comments --minify-js true --minify-css true "$file" -o "$filename"
          done
          touch .nojekyll  # <--- AGGIUNGI QUESTA RIGA: Forza GitHub a ignorare il README come index
          echo "✅ Minificazione e bypass Jekyll completati"

      # --- 4. SINCRONIZZAZIONE DATE ---
      - name: 📅 Update README and Sitemap
        run: |
          CURRENT_DATE=$(date +'%Y-%m-%d')
          sed -i "s/202[0-9]-[0-9]\{2\}-[0-9]\{2\}/$CURRENT_DATE/g" README.md
          if [ -f sitemap.xml ]; then
            sed -i "s|<lastmod>.*</lastmod>|<lastmod>$CURRENT_DATE</lastmod>|g" sitemap.xml
          fi

      # --- 5. DEPLOY SU GH-PAGES ---
      - name: 🚀 Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
          clean: true

      # --- 6. SINCRONIZZAZIONE DATI SU MAIN ---
      - name: 💾 Sync SRE Data back to Main
        if: success() || steps.performance.outcome == 'success'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/performance-latest.json README.md sitemap.xml
          if ! git diff --staged --quiet; then
            git commit -m "📈 SRE Audit Update ($(date -u +'%Y-%m-%dT%H:%M:%SZ'))"
            git push origin main
          fi

      # --- 7. ALERT SOLO PER ERRORI REALI (Crash o Security) ---
      - name: 🚨 Crea alert critico
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.payload.repository.html_url}/actions/runs/${context.runId}`;
            const title = '⚠️ ALERT: System Outage o Security Breach in BiotechProject';
            const body = `Il workflow è fallito. Controlla immediatamente lo stato del sistema.\n\n[Analizza i log qui](${runUrl})`;
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['critical-alert', 'sre-outage']
            })

